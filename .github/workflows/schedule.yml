name: Defense News Bot

on:
  schedule:
    - cron: '0,30 22-23 * * *'    # 07:00, 07:30, 08:00, 08:30 KST
    - cron: '0,30 0-9 * * *'      # 09:00~18:30 KST
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install python-telegram-bot==20.7 feedparser==6.0.11

      - name: 뉴스 전송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python defense_news_bot.py
