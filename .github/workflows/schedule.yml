name: Defense News Bot

on:
  schedule:
    - cron: '0 22,0,2,4,6,8 * * *'   # 07:00, 09:00, 11:00, 13:00, 15:00, 17:00 KST
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 기사 기록 파일 가져오기
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: 뉴스 전송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python defense_news_bot.py

      - name: 기사 기록 저장
        run: |
          git add sent_articles.json || true
          git diff --staged --quiet || git commit -m "Update sent articles"
          git push || true
